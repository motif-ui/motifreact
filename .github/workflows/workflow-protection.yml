name: "Workflow Protection"

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  protect:
    name: Detect Workflow Tampering
    runs-on: ubuntu-latest
    steps:

      - name: Check for unauthorized .github/ changes
        uses: actions/github-script@v7
        with:
          script: |
            let page = 1;
            let allFiles = [];
            while (true) {
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
              page,
            });
            allFiles = allFiles.concat(files);
            if (files.length < 100) break;
            page++;
            } 
          
            const sensitiveFiles = allFiles.filter(f =>
            f.filename.startsWith('.github/workflows/') ||
            f.filename.startsWith('.github/actions/')
            );

            if (sensitiveFiles.length === 0) {
              core.info('No workflow or action files changed. ✅');
              return;
            }

            // 2. Check if the PR author is an authorized collaborator
            let authorized = false;
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: context.payload.pull_request.user.login,
              });
              authorized = ['admin', 'maintain', 'write'].includes(data.role_name);
            } catch {
              authorized = false;
            }

            if (!authorized) {
              const changed = sensitiveFiles.map(f => `  - ${f.filename}`).join('\n');
              core.setFailed(
                `❌ This PR modifies protected files and the author is not an authorized collaborator.\n` +
                `Changed files:\n${changed}`
              );
            } else {
              core.info(`Authorized collaborator modifying .github/ files. ✅`);
            }
