name: Code Validator

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: 'false'
      - uses: ./.github/actions/setup-node-deps
      - run: npm run build:lib

  test:
    name: Lint | Type Check | Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: 'false'
      - uses: ./.github/actions/setup-node-deps
      - run: |
          npm run lint
          npm run type-check
          npm run scss-check
          npm run test:ci