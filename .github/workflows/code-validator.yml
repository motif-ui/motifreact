name: Code Validator

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: false

      - name: Setup Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Build Library
        run: npm run build:lib

      - name: Run Linters and Tests
        run: |
          npm run lint
          npm run check:type
          npm run check:scss
          npx jest --ci --coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b358c0f0dc4f0fd44f2d6f95dd1f605d2e4d2 # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Package size report
        uses: pkg-size/action@a637fb0897b6f14f18e776d8c3dbccb34a1ad27b # v1.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@42f35949c5b9b9945a97303b2a2020fdb6f66538 # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=motif-ui
            -Dsonar.projectKey=motif-ui_motifreact
            -Dsonar.sources=src
