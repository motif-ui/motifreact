name: "Lint PR Title"

on:
  pull_request:
    types:
      - opened
      - edited

jobs:
  main:
    name: Validate PR Title
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            perf
            feat
            fix
            docs
            style
            refactor
            test
            chore
            build
            ci
            revert

          requireScope: false